<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudos de iframe</title>
    <style>
        iframe{
            width: 500px;
            height: 500px;
            border: 1px dashed black;
        }
    </style>
</head>
<body>
    <!--Tamanho Padrão de um iframe é de 300x150px-->
    <!--Alguns sites tem uma proteção contra o uso de iframes.-->
    <h1>Testando os usos de iframes</h1>
    <p>Acessando o sito do 
        <!--Frameborder 0 = sem borda 
            Frameborder 1 = com borda-->
        <iframe src="https://www.cursoemvideo.com" frameborder="0">
            <!--Essa opção só aparecerá se o navegador não conseguir exibir o iframe.-->
            <a href="https://www.cursoemvideo.com">Curso em vídeo. </a>
        </iframe>
         para aprender a progamar.</p>
    <p>
        O repositório do Guanabara no
        <!--Scolling é um atributo usado para modificar certas opções da barra de rolagem-->
        <!--Alguns navegadores não aceitam essas opções.-->
        <iframe src="https://gustavoguanabara.github.io" frameborder="0" scolling="no">
            <a href="https://gustavoguanabara.github.io">Github</a>
        </iframe>
        também é bem legal.
    </p>

</body>
</html>
