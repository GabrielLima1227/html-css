<!DOCTYPE html>
<html lang="Pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family:'Love';
            src: url('fonts/love larry ttf.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        /*Tipos de Format()
            - opentype (otf)
            - truetype (ttf)
            - embedded-aat (Apple Advanced Typography)
            -sgv
        */
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        h1{
            font-family: 'Love', Times, serif;
            font-size: 3em;
        }
    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Cum eligendi maiores architecto optio, voluptatibus sed cupiditate incidunt, ducimus saepe perspiciatis rerum ipsum. Distinctio impedit recusandae facilis sunt vel esse veritatis.</p>
</body>
</html>
