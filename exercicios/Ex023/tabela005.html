<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <Style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        table{
            width: 500px;
            border-collapse: collapse;
        }
        caption{
            font-size: 1.5em;
            font-weight: bolder;
            padding: 8px;
        }
        th,td{
            border: 1px solid black;
        }
        col.cnome{
            background-color: lightgreen;
        }
        col.csexo, col.cidade{
            background-color: lightyellow;
        }
    </Style>
</head>
<body>
    <table>
        <colgroup>
            <col class="cnome">
            <col class="csexo">
            <col class="cidade">
            <col class="cprof">
        </colgroup>
        <caption>Cadastro</caption>
        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Sexo</th>
            <th scope="col">Idade</th>
            <th scope="col">Profissão</th>
        </tr>
        <tr>
            <td>Ana Maria</td>
            <td>F</td>
            <td>25</td>
            <td>Jornalista</td>
        </tr>
        <tr>
            <td>João Guilherme</td>
            <td>M</td>
            <td>23</td>
            <td>Engenheiro</td>
        </tr>
        <tr>
            <td>Victor Santos</td>
            <td>M</td>
            <td>19</td>
            <td>Técnico Bancario</td>
        </tr>
        <tr>
            <td>Sara Lima</td>
            <td>F</td>
            <td>23</td>
            <td>Enfermeira</td>
        </tr>
        <tr>
            <td>Maria Luiza</td>
            <td>F</td>
            <td>26</td>
            <td>Biologa</td>
        </tr>
        <tr>
            <td>Bruna Raquel</td>
            <td>F</td>
            <td>21</td>
            <td>Progamadora</td>
        </tr>
    </table>
</body>
</html>
