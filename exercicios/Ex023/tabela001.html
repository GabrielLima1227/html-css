<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        table{
            height: 400px;
            width: 400px;
            border-collapse: collapse;
        }
        td{
            padding: 8px;
            text-align: center; /*Alinhamento Horizontal*/
            vertical-align: middle; /*Alinhamento Vertical*/
            border: 1px solid black;
        }
        .numero{
            text-align: right;
        }
    </style>
</head>
<body>
    <h1>Minha Primeira Tabela</h1>
    <!--Hierarquia de Tabelas (Simples)
            Table = Tabelas
                Table Rows = Linhas da Tabela
                    Table Header = Cabeçalho da Tabela
                        Table Data = Dados da Tabela
    -->
    <table >
        <!--Tr = Table Rows-->
        <tr > <!--Primeira Linha-->
            <td>A1</td> <!--Dados da Tabela-->
            <td>B1</td>
            <td>C1</td>
        </tr>
        <tr class="linha"> <!--Segunda Linha-->
            <td class="dado">A2</td> <!--Dados da Tabela-->
            <td class="dado">B2</td>
            <td class="numero">C2</td>
        </tr>
        <tr> <!--Terceira Linha-->
            <td>A3</td> <!--Dados da Tabela-->
            <td>B3</td>
            <td class="numero">C3</td>
        </tr>
        <tr class="linha"> <!--Quarta Linha-->
            <td class="dado">A4</td> <!--Dados da Tabela-->
            <td class="dado">B4</td>
            <td class="dado">C4</td>
        </tr>
    </table>
</body>
</html>
