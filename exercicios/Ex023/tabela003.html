<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <Style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        Table{
            width: 300px;
            border-collapse: collapse;
        }
        td{
            padding: 10px;
            text-align: center;
            border: 1px solid black;
        }
    </Style>
</head>
<body>
    <h1>Mesclagem de Células</h1>
    <table>
        <tr>
            <td>A</td>
            <!--Usaremos um dos tipos de mesclagem de células, chamado colsapan, que server para mesclar colunas.-->
            <td colspan="2">B</td>
        </tr>
        <tr>
            <!--O rowsapan,vserver para mesclar linhas.-->  
            <td rowspan="3">D</td>
            <td>E</td>
            <td rowspan="2">F</td>
        </tr>
        <tr>
            <td>H</td>
        </tr>
        <tr> 
            <td colspan="2">K</td>
        </tr>
    </table>
</body>
</html>
