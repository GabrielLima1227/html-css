<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=], initial-scale=1.0">
    <title>Astronauta no Espaço</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;
        }
        #espaço{
            height: 100vh;
            position: relative;
            background-image: url(imagens/espaco.jpg);
            background-repeat: no-repeat;
            background-size: 100% 100%;
        }
        #astronauta{
            width: 700px;
            height: 700px;
            position: absolute;
            background-image: url(imagens/astronauta.png);
            background-size: 100% 100%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
    </style>
</head>
<body>
    <section id="espaço">
        <article id="astronauta">

        </article>
    </section>
</body>
</html>
